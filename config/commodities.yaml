# Series calculadas a partir de los anteriores. La página las renderiza como
# spreads / cracks / time spreads.
derivados:
  spreads_crudo:
    - nombre: WTI–Brent arb
      formula: "CL - BZ"
      operandos: [CL=F, BZ=F]
      unidad: USD/bbl
      nota: "Negativo = WTI descuenta vs Brent. Anomalías indican arb tight o saturación US."
  cracks:
    - nombre: 3:2:1 Crack (USGC)
      formula: "((2*RB + HO)*42 - CL)/3"
      operandos: [RB=F, HO=F, CL=F]
      unidad: USD/bbl
      nota: "Margen refinador estándar. Sube fuerte cuando atacan refinerías."
    - nombre: Gasoil–Brent (Europa)
      formula: "LGO/7.45 - BZ"
      operandos: [LGO=F, BZ=F]
      unidad: USD/bbl
      nota: "7.45 bbl/ton (gasoil). Margen del diesel europeo."
